<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, max-scale=1.0, user-scalable=no">
    <title>WATCH DIRECT - Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .nav-item.active { color: #1A365D; font-weight: bold; }
    </style>
</head>
<body>

    <script>
        const SUPABASE_URL = 'https://vkeszkqqaizjivtebbvt.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_z1ZJK5I3wuPJLgs-5lfH8A_Z6Vo9W_H';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // [기능] 사용자 상태 체크 (로그인 되어있는지)
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            currentUser = user;
            updateUI();
            fetchWatches();
        }

        // [기능] 회원가입/로그인 (테스트를 위해 가입과 로그인을 동시에 처리)
        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pw').value;
            if(!email || !password) { alert('이메일과 비번을 입력해주세요.'); return; }

            // 일단 로그인 시도
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                // 로그인 실패하면 가입 시도
                const { error: signUpError } = await _supabase.auth.signUp({ email, password });
                if (signUpError) { alert('에러: ' + signUpError.message); return; }
                alert('가입되었습니다! 다시 로그인해주세요.');
            } else {
                currentUser = data.user;
                alert('반갑습니다 사장님!');
                showPage('home');
                updateUI();
            }
        }

        // [기능] 로그아웃
        async function handleLogout() {
            await _supabase.auth.signOut();
            currentUser = null;
            updateUI();
            showPage('home');
        }

        function updateUI() {
            const authStatus = document.getElementById('auth-status');
            const sellBtn = document.getElementById('sell-nav-btn');
            
            if (currentUser) {
                authStatus.innerText = currentUser.email + ' (Logged In)';
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('profile-box').style.display = 'block';
            } else {
                authStatus.innerText = 'Not Logged In';
                document.getElementById('login-box').style.display = 'block';
                document.getElementById('profile-box').style.display = 'none';
            }
        }

        // [기능] 매물 불러오기 (기존 동일)
        async function fetchWatches() {
            const { data, error } = await _supabase.from('watches').select('*').order('created_at', { ascending: false });
            if (error) return;
            const container = document.getElementById('watch-list');
            container.innerHTML = ''; 
            data?.forEach(watch => {
                const img = watch.image_url || 'https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=500';
                container.innerHTML += `
                    <div onclick="openDetail('${watch.model_name}', ${watch.target_price}, '${img}')" class="bg-white rounded-2xl overflow-hidden shadow-sm border p-2">
                        <img src="${img}" class="w-full aspect-square object-cover rounded-xl">
                        <div class="mt-2 px-1">
                            <h3 class="font-bold text-sm truncate">${watch.model_name}</h3>
                            <p class="text-xs text-slate-400">₩ ${Number(watch.target_price).toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });
        }

        function showPage(pageId) {
            // 로그인 안 되어있는데 판매 탭 누르면 차단!
            if (pageId === 'sell' && !currentUser) {
                alert('시계를 팔려면 로그인이 필요합니다!');
                showPage('support');
                return;
            }
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function openDetail(name, price, img) {
            document.getElementById('detail-name').innerText = name;
            document.getElementById('detail-price').innerText = '₩ ' + Number(price).toLocaleString();
            document.getElementById('detail-img').src = img;
            showPage('detail');
        }

        window.onload = checkUser;
    </script>

    <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 onclick="showPage('home')" class="text-xl font-black text-[#1A365D] tracking-tighter cursor-pointer">WATCH DIRECT</h1>
        <p id="auth-status" class="text-[10px] font-bold text-slate-300"></p>
    </nav>

    <div id="home" class="page active pb-24 p-4">
        <div id="watch-list" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="sell" class="page pb-24 p-6">
        <h2 class="text-2xl font-black mb-6">판매 등록</h2>
        <p class="text-xs text-slate-400 mb-4 font-bold">인증된 판매자 전용 폼입니다.</p>
        <div class="space-y-4">
            <input id="input-model" type="text" placeholder="모델명" class="w-full border-b py-3 outline-none">
            <input id="input-price" type="number" placeholder="가격(₩)" class="w-full border-b py-3 outline-none">
            <button onclick="alert('가입 성공하셨으니 이제 진짜 매물 등록도 가능합니다!')" class="w-full bg-[#1A365D] text-white py-5 rounded-2xl font-bold">등록하기</button>
        </div>
    </div>

    <div id="support" class="page pb-24 p-6">
        <div id="login-box" class="py-10">
            <h2 class="text-3xl font-black mb-2">Member</h2>
            <p class="text-slate-400 text-sm mb-8">안전한 거래를 위해 로그인해주세요.</p>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="이메일 주소" class="w-full bg-white border p-4 rounded-2xl outline-none">
                <input id="auth-pw" type="password" placeholder="비밀번호" class="w-full bg-white border p-4 rounded-2xl outline-none">
                <button onclick="handleAuth()" class="w-full bg-[#1A365D] text-white py-4 rounded-2xl font-bold shadow-lg">로그인 / 1초 회원가입</button>
            </div>
        </div>

        <div id="profile-box" class="py-10 hidden text-center">
            <h2 class="text-2xl font-black mb-4">내 정보</h2>
            <button onclick="handleLogout()" class="text-red-500 font-bold underline">로그아웃</button>
        </div>
    </div>

    <div id="detail" class="page bg-white">
        <button onclick="showPage('home')" class="p-6 font-bold underline">← 뒤로</button>
        <img id="detail-img" class="w-full aspect-square object-cover">
        <div class="p-6">
            <h2 id="detail-name" class="text-2xl font-bold"></h2>
            <p id="detail-price" class="text-3xl font-black mt-2 text-[#1A365D]"></p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 border-t px-10 py-4 flex justify-between z-50">
        <button onclick="showPage('home')" class="nav-item active flex flex-col items-center"><span>🏠</span><span class="text-[10px]">홈</span></button>
        <button onclick="showPage('sell')" id="sell-nav-btn" class="nav-item flex flex-col items-center"><span>➕</span><span class="text-[10px]">판매</span></button>
        <button onclick="showPage('support')" class="nav-item flex flex-col items-center"><span>👤</span><span class="text-[10px]">MY</span></button>
    </div>

</body>
</html>
