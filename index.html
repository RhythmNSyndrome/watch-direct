<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, max-scale=1.0, user-scalable=no">
    <title>WATCH DIRECT - Kakao Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .nav-item.active { color: #1A365D; font-weight: bold; }
    </style>
</head>
<body>

    <script>
        const SUPABASE_URL = 'https://vkeszkqqaizjivtebbvt.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_z1ZJK5I3wuPJLgs-5lfH8A_Z6Vo9W_H';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // [인증] 사용자 상태 체크
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            currentUser = user;
            updateUI();
            fetchWatches();
        }

        // [카카오 로그인 함수] 사장님이 요청하신 부분입니다!
        async function signInWithKakao() {
            const { data, error } = await _supabase.auth.signInWithOAuth({
                provider: 'kakao',
                options: {
                    redirectTo: window.location.origin
                }
            });
            if (error) alert('카카오 로그인 에러: ' + error.message);
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            currentUser = null;
            location.reload(); 
        }

        function updateUI() {
            const status = document.getElementById('auth-status');
            if (currentUser) {
                // 카카오 닉네임이나 이메일 앞부분 표시
                status.innerText = (currentUser.user_metadata.full_name || currentUser.email.split('@')[0]) + '님';
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('profile-box').style.display = 'block';
            } else {
                status.innerText = '로그인 필요';
                document.getElementById('login-box').style.display = 'block';
                document.getElementById('profile-box').style.display = 'none';
            }
        }

        // [기능] 매물 불러오기
        async function fetchWatches() {
            const { data, error } = await _supabase.from('watches').select('*').order('created_at', { ascending: false });
            if (error) return;
            const container = document.getElementById('watch-list');
            container.innerHTML = ''; 
            data?.forEach(watch => {
                const img = watch.image_url || 'https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=500';
                container.innerHTML += `
                    <div onclick="openDetail('${watch.model_name}', ${watch.target_price}, '${img}')" class="bg-white rounded-2xl overflow-hidden shadow-sm border p-2 active:scale-95 transition-all cursor-pointer">
                        <img src="${img}" class="w-full aspect-square object-cover rounded-xl bg-slate-50">
                        <div class="mt-2 px-1">
                            <h3 class="font-bold text-sm truncate">${watch.model_name}</h3>
                            <p class="text-xs text-slate-400 font-mono">₩ ${Number(watch.target_price).toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });
        }

        async function uploadWatch() {
            if (!currentUser) { alert('로그인이 필요합니다!'); return; }
            
            const model = document.getElementById('input-model').value;
            const price = document.getElementById('input-price').value;
            const fileInput = document.getElementById('input-image');
            const btn = document.getElementById('reg-btn');
            
            if(!model || !price || !fileInput.files[0]) { alert('사진과 정보를 모두 입력하세요.'); return; }

            btn.innerText = '업로드 중...';
            btn.disabled = true;

            const file = fileInput.files[0];
            const fileName = `${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await _supabase.storage.from('watch-images').upload(fileName, file);

            if (uploadError) { alert('사진 업로드 실패'); btn.disabled = false; return; }

            const { data: urlData } = _supabase.storage.from('watch-images').getPublicUrl(fileName);
            
            const { error: dbError } = await _supabase.from('watches').insert([
                { model_name: model, target_price: parseInt(price), image_url: urlData.publicUrl }
            ]);

            if (dbError) { alert('등록 에러'); } 
            else {
                alert('매물이 등록되었습니다!');
                showPage('home');
                fetchWatches();
            }
            btn.innerText = '검수 예약 및 등록';
            btn.disabled = false;
        }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = () => {
                const output = document.getElementById('preview-img');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function showPage(pageId) {
            if (pageId === 'sell' && !currentUser) {
                alert('판매는 로그인 후 가능합니다!');
                showPage('support');
                return;
            }
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function openDetail(name, price, img) {
            document.getElementById('detail-name').innerText = name;
            document.getElementById('detail-price').innerText = '₩ ' + Number(price).toLocaleString();
            document.getElementById('detail-img').src = img;
            showPage('detail');
        }

        window.onload = checkUser;
    </script>

    <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 onclick="showPage('home')" class="text-xl font-black text-[#1A365D] tracking-tighter cursor-pointer underline decoration-4">WATCH DIRECT</h1>
        <span id="auth-status" class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded-full text-slate-500"></span>
    </nav>

    <div id="home" class="page active pb-24 p-4">
        <div id="watch-list" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="sell" class="page pb-24 p-6">
        <h2 class="text-2xl font-black mb-6">시계 판매 등록</h2>
        <div class="space-y-6">
            <div class="bg-slate-100 rounded-2xl p-4 text-center border-2 border-dashed border-slate-300 relative aspect-video flex flex-col items-center justify-center overflow-hidden">
                <input type="file" id="input-image" class="hidden" accept="image/*" onchange="previewImage(event)">
                <label for="input-image" class="cursor-pointer z-10 font-bold text-slate-500 text-xs">📸 시계 사진 선택</label>
                <img id="preview-img" class="absolute inset-0 w-full h-full object-cover hidden">
            </div>
            <input id="input-model" type="text" placeholder="모델명" class="w-full border-b py-3 outline-none">
            <input id="input-price" type="number" placeholder="희망 판매가(₩)" class="w-full border-b py-3 outline-none font-mono">
            <button id="reg-btn" onclick="uploadWatch()" class="w-full bg-[#1A365D] text-white py-5 rounded-2xl font-bold shadow-xl">검수 예약 및 등록</button>
        </div>
    </div>

    <div id="support" class="page pb-24 p-6">
        <div id="login-box" class="py-10 text-center">
            <h2 class="text-3xl font-black mb-2">Member</h2>
            <p class="text-slate-400 text-sm mb-10 font-medium">카카오로 본인인증 후 이용 가능합니다.</p>
            
            <button onclick="signInWithKakao()" class="w-full bg-[#FEE500] text-[#191919] py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
                <span class="text-lg">🟡</span> 카카오로 1초 로그인
            </button>
        </div>

        <div id="profile-box" class="py-10 hidden">
            <div class="bg-white p-6 rounded-3xl border shadow-sm text-center">
                <div class="w-16 h-16 bg-slate-100 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl">⌚</div>
                <p class="font-bold text-slate-800 mb-6">인증이 완료되었습니다.</p>
                <button onclick="handleLogout()" class="text-red-500 text-sm font-bold underline">로그아웃</button>
            </div>
        </div>
    </div>

    <div id="detail" class="page bg-white">
        <button onclick="showPage('home')" class="p-6 font-bold">← 뒤로가기</button>
        <img id="detail-img" class="w-full aspect-square object-cover">
        <div class="p-6">
            <h2 id="detail-name" class="text-2xl font-black"></h2>
            <p id="detail-price" class="text-3xl font-black mt-2 text-[#1A365D]"></p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 border-t px-10 py-4 flex justify-between z-50">
        <button onclick="showPage('home')" class="nav-item active flex flex-col items-center flex-1"><span>🏠</span><span class="text-[10px] font-bold">홈</span></button>
        <button onclick="showPage('sell')" class="nav-item flex flex-col items-center flex-1"><span>➕</span><span class="text-[10px] font-bold">판매</span></button>
        <button onclick="showPage('support')" class="nav-item flex flex-col items-center flex-1"><span>👤</span><span class="text-[10px] font-bold">MY</span></button>
    </div>

</body>
</html>
