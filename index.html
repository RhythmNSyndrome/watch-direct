<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>워치다이렉트 - 컬렉터 직거래 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-[#1A365D] text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">WATCH DIRECT</h1>
            <div class="text-xs bg-blue-500 px-2 py-1 rounded">BETA</div>
        </div>
    </nav>

    <main class="max-w-md mx-auto pb-24">
        <div class="bg-white aspect-square w-full overflow-hidden shadow-sm">
            <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?q=80&w=1000&auto=format&fit=crop" alt="럭셔리 워치" class="w-full h-full object-cover">
        </div>

        <div class="p-6 bg-white border-b">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span class="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Live Auction</span>
                    <h2 class="text-2xl font-bold mt-2">Rolex Submariner</h2>
                    <p class="text-slate-400 text-sm">Ref. 126610LN | 2024 Full Set</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Time Left</p>
                    <p class="text-lg font-bold text-red-500 tabular-nums">14:22:05</p>
                </div>
            </div>

            <div class="bg-[#1A365D] rounded-2xl p-5 text-white shadow-xl transform transition-all">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-xs opacity-70">현재 최고 입찰가</span>
                    <span class="text-xs bg-white/20 px-2 py-0.5 rounded">8명 참여중</span>
                </div>
                <div class="text-3xl font-bold tracking-tight">₩ 16,500,000</div>
            </div>
        </div>

        <div class="p-6 space-y-4">
            <h3 class="font-bold text-sm text-slate-500 uppercase tracking-widest">Trust Guarantee</h3>
            <div class="bg-white p-4 rounded-xl border border-slate-200 flex items-center shadow-sm">
                <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center mr-4 text-blue-600 font-bold">✓</div>
                <div>
                    <p class="text-sm font-bold">MOU 공인 검수소 보증</p>
                    <p class="text-xs text-slate-400">명장의 정밀 검수 후 거래가 확정됩니다.</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 flex items-center shadow-sm">
                <div class="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center mr-4 text-orange-600 font-bold">!</div>
                <div>
                    <p class="text-sm font-bold">노쇼 방지 시스템</p>
                    <p class="text-xs text-slate-400">거래 파기 시 예약금이 상대에게 보상됩니다.</p>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t z-50">
        <div class="max-w-md mx-auto">
            <button class="w-full bg-[#1A365D] hover:bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-[0.98]">
                입찰 참여하기 (예약금 결제)
            </button>
        </div>
    </div>
</body>
</html>
