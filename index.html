<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>워치다이렉트 - 컬렉터 직거래</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .page { display: none; }
        .page.active { display: block; }
        .nav-item.active { color: #1A365D; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-black text-[#1A365D] tracking-tighter">WATCH DIRECT</h1>
        <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-full font-bold">SEOUL</span>
    </nav>

    <div id="home" class="page active pb-24">
        <div class="p-4 grid grid-cols-2 gap-4">
            <div onclick="showPage('detail')" class="bg-white rounded-2xl overflow-hidden shadow-sm border">
                <img src="https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?w=500" class="w-full aspect-square object-cover">
                <div class="p-3">
                    <p class="text-[10px] text-red-500 font-bold uppercase">8시간 남음</p>
                    <h3 class="font-bold text-sm truncate">로렉스 데이토나</h3>
                    <p class="text-xs text-slate-400">₩ 48,500,000</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border opacity-80">
                <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=500" class="w-full aspect-square object-cover">
                <div class="p-3">
                    <p class="text-[10px] text-slate-400 font-bold">입찰 대기중</p>
                    <h3 class="font-bold text-sm truncate">로렉스 서브마리너</h3>
                    <p class="text-xs text-slate-400">₩ 16,500,000</p>
                </div>
            </div>
        </div>
    </div>

    <div id="sell" class="page pb-24 p-6">
        <h2 class="text-2xl font-bold mb-6">판매 예약하기</h2>
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">시계 모델명</label>
                <input type="text" placeholder="예: 로렉스 서브마리너" class="w-full border-b py-2 outline-none focus:border-[#1A365D]">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">희망 시작가</label>
                <input type="number" placeholder="₩" class="w-full border-b py-2 outline-none focus:border-[#1A365D]">
            </div>
            <div class="bg-slate-100 aspect-video rounded-2xl flex flex-col items-center justify-center text-slate-400 border-2 border-dashed">
                <span class="text-2xl">+</span>
                <p class="text-xs">시계 사진 추가</p>
            </div>
            <button class="w-full bg-[#1A365D] text-white py-4 rounded-2xl font-bold shadow-lg">검수 예약 및 등록</button>
        </div>
    </div>

    <div id="support" class="page pb-24 p-6">
        <h2 class="text-2xl font-bold mb-2">고객센터</h2>
        <p class="text-slate-400 text-sm mb-8">워치다이렉트는 24시간 열려있습니다.</p>
        
        <div class="space-y-3">
            <button onclick="location.href='https://pf.kakao.com'" class="w-full bg-[#FEE500] text-[#1A1A1C] py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                카카오톡 1:1 상담
            </button>
            <button class="w-full bg-white border py-4 rounded-2xl font-bold text-slate-600">
                노쇼 및 부정거래 신고
            </button>
            <button class="w-full bg-white border py-4 rounded-2xl font-bold text-slate-600">
                자주 묻는 질문 (FAQ)
            </button>
        </div>
    </div>

    <div id="detail" class="page pb-32">
        <button onclick="showPage('home')" class="p-4 text-slate-400">
