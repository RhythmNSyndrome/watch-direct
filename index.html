<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, max-scale=1.0, user-scalable=no">
    <title>WATCH DIRECT - Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .page { display: none; }
        .page.active { display: block; }
        .nav-item.active { color: #1A365D; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <script>
        // 사장님의 데이터베이스 열쇠
        const SUPABASE_URL = 'https://vkeszkqqaizjivtebbvt.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_z1ZJK5I3wuPJLgs-5lfH8A_Z6Vo9W_H';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // [기능 1] 홈 화면에 실시간 매물 불러오기
        async function fetchWatches() {
            const { data, error } = await _supabase.from('watches').select('*').order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            
            const container = document.getElementById('watch-list');
            container.innerHTML = ''; 

            if (!data || data.length === 0) {
                container.innerHTML = '<p class="col-span-2 text-center py-20 text-slate-400 text-sm">현재 등록된 매물이 없습니다.<br>첫 매물을 등록해보세요!</p>';
                return;
            }

            data.forEach(watch => {
                container.innerHTML += `
                    <div onclick="openDetail('${watch.model_name}', ${watch.target_price})" class="bg-white rounded-2xl overflow-hidden shadow-sm border cursor-pointer active:scale-95 transition-all">
                        <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=500" class="w-full aspect-square object-cover bg-slate-100">
                        <div class="p-3">
                            <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">${watch.status || 'Live'}</p>
                            <h3 class="font-bold text-sm truncate mt-1">${watch.model_name}</h3>
                            <p class="text-xs text-slate-400 font-mono mt-0.5">₩ ${Number(watch.target_price).toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });
        }

        // [기능 2] 진짜로 데이터베이스에 매물 저장하기
        async function uploadWatch() {
            const model = document.getElementById('input-model').value;
            const price = document.getElementById('input-price').value;
            
            if(!model || !price) { alert('모델명과 가격을 입력해주세요!'); return; }

            // "등록 중..." 상태 표시 (사장님이 보시기에 덜 심심하게)
            const btn = document.getElementById('reg-btn');
            btn.innerText = '데이터 창고로 보내는 중...';
            btn.disabled = true;

            const { error } = await _supabase.from('watches').insert([
                { model_name: model, target_price: parseInt(price) }
            ]);

            if (error) {
                alert('등록 실패: ' + error.message);
                btn.innerText = '다시 시도하기';
                btn.disabled = false;
            } else {
                alert('매물이 성공적으로 등록되었습니다!');
                document.getElementById('input-model').value = '';
                document.getElementById('input-price').value = '';
                btn.innerText = '검수 예약 및 등록';
                btn.disabled = false;
                showPage('home'); // 홈으로 이동
                fetchWatches();   // 리스트 갱신
            }
        }

        function openDetail(name, price) {
            document.getElementById('detail-name').innerText = name;
            document.getElementById('detail-price').innerText = '₩ ' + Number(price).toLocaleString();
            showPage('detail');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const items = document.querySelectorAll('.nav-item');
            if(pageId === 'home') items[0].classList.add('active');
            if(pageId === 'sell') items[1].classList.add('active');
            if(pageId === 'support') items[2].classList.add('active');
            
            window.scrollTo(0, 0);
        }

        // 앱 시작하자마자 데이터 불러오기
        window.onload = fetchWatches;
    </script>

    <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 onclick="showPage('home')" class="text-xl font-black text-[#1A365D] tracking-tighter cursor-pointer">WATCH DIRECT</h1>
        <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-full font-bold uppercase tracking-widest">Master</span>
    </nav>

    <div id="home" class="page active pb-24">
        <div id="watch-list" class="p-4 grid grid-cols-2 gap-4">
            </div>
    </div>

    <div id="sell" class="page pb-24 p-6">
        <h2 class="text-2xl font-bold mb-6 italic tracking-tight">Sell Your Watch</h2>
        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Model Name</label>
                <input id="input-model" type="text" placeholder="예: 로렉스 데이토나" class="w-full border-b py-3 outline-none focus:border-[#1A365D] bg-transparent">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Target Price (₩)</label>
                <input id="input-price" type="number" placeholder="48500000" class="w-full border-b py-3 outline-none focus:border-[#1A365D] bg-transparent font-mono">
            </div>
            <button id="reg-btn" onclick="uploadWatch()" class="w-full bg-[#1A365D] text-white py-5 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">검수 예약 및 등록</button>
        </div>
    </div>

    <div id="detail" class="page pb-24 bg-white min-h-screen">
        <button onclick="showPage('home')" class="p-4 text-slate-900 font-bold">← 목록으로</button>
        <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=1000" class="w-full aspect-square object-cover">
        <div class="p-6 text-center">
            <h2 id="detail-name" class="text-2xl font-bold">모델명</h2>
            <div class="bg-[#1A365D] text-white p-6 rounded-3xl mt-6 shadow-2xl">
                <p class="text-xs opacity-70 mb-1">현재 최고 입찰가</p>
                <p id="detail-price" class="text-3xl font-black tracking-tighter">₩ 0</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t px-6 py-3 flex justify-between items-center z-50">
        <button onclick="showPage('home')" class="nav-item active flex flex-col items-center flex-1">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold">홈</span>
        </button>
        <button onclick="showPage('sell')" class="nav-item flex flex-col items-center flex-1 border-x border-slate-50">
            <span class="text-xl">➕</span>
            <span class="text-[10px] font-bold">판매등록</span>
        </button>
        <button onclick="showPage('support')" class="nav-item flex flex-col items-center flex-1">
            <span class="text-xl">💬</span>
            <span class="text-[10px] font-bold">센터</span>
        </button>
    </div>

</body>
</html>
